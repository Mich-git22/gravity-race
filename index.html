<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nave vs Meteoritos NIVELES</title>

<style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    margin:0;
    overflow:hidden;
}

#menu{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    background:cyan;
    cursor:pointer;
    border-radius:10px;
}

canvas{
    border:3px solid white;
    background: radial-gradient(circle, #000 40%, #020024 100%);
    display:none;
    width:100vw;
    height:100vh;
}
</style>

</head>
<body>

<div id="menu">
    <h1>🚀 Nave vs Meteoritos ☄️</h1>
    <p><b>Reglas del juego:</b></p>
    <p>ESPACIO = subir | F = disparar | R = reiniciar</p>
    <br>
    <button onclick="iniciarJuego()">▶️ Iniciar Juego</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
function iniciarJuego(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameCanvas").style.display = "block";
}

// CANVAS RESPONSIVE
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// 🚀 NAVE
const player = {
    x: 100,
    y: 200,
    width: 60,
    height: 40,
    velY: 0,
    gravity: 0.5,
    thrust: -10
};

// VARIABLES
let vidas = 3;
let nivel = 1;
let dificultad = 80;

let meteors = [];
let bullets = [];
let particles = [];

let frame = 0;
let score = 0;
let gameOver = false;

// INVENCIBILIDAD
let invencible = false;
let tiempoInvencible = 0;

// CONTROLES
document.addEventListener("keydown", function(e){
    if(e.code === "Space"){
        player.velY = player.thrust;
    }

    if(e.key.toLowerCase() === "f"){
        bullets.push({
            x: player.x + 60,
            y: player.y + player.height/2,
            speed: 8
        });
    }

    if(e.key.toLowerCase() === "r"){
        resetGame();
    }
});

// RESET
function resetGame(){
    meteors = [];
    bullets = [];
    particles = [];
    score = 0;
    vidas = 3;
    nivel = 1;
    dificultad = 80;
    gameOver = false;
    player.y = 200;
    invencible = false;
}

// ☄️ METEORITOS
function createMeteor(){
    let points = [];
    let sides = 7 + Math.floor(Math.random()*5);

    for(let i=0;i<sides;i++){
        points.push({
            angle: (Math.PI * 2 / sides) * i,
            radius: 20 + Math.random()*12
        });
    }

    meteors.push({
        x: canvas.width,
        y: Math.random() * canvas.height,
        points: points,
        rotation: 0,
        rotationSpeed: (Math.random()*0.04) - 0.02,
        speed: 2 + Math.random()*nivel,
        size: 30,
        alive:true
    });
}

// 💥 EXPLOSIÓN
function createExplosion(x,y){
    for(let i=0;i<20;i++){
        particles.push({
            x:x,
            y:y,
            vx:(Math.random()-0.5)*5,
            vy:(Math.random()-0.5)*5,
            life:30
        });
    }
}

// UPDATE
function update(){
    frame++;

    if(!gameOver){

        player.velY += player.gravity;
        player.y += player.velY;

        if(player.y < 0) player.y = 0;
        if(player.y > canvas.height - player.height){
            player.y = canvas.height - player.height;
        }

        if(frame % dificultad === 0){
            createMeteor();
        }

        for(let m of meteors){
            if(!m.alive) continue;

            m.x -= m.speed + (nivel * 0.5);
            m.rotation += m.rotationSpeed;

            if(
                player.x < m.x + m.size &&
                player.x + player.width > m.x - m.size &&
                player.y < m.y + m.size &&
                player.y + player.height > m.y - m.size
            ){
                if(m.alive && !invencible){
                    m.alive = false;
                    createExplosion(player.x, player.y);
                    vidas--;

                    invencible = true;
                    tiempoInvencible = 60;

                    if(vidas <= 0){
                        gameOver = true;
                    }
                }
            }

            if(m.x < player.x && m.alive){
                score++;
                m.alive = false;
            }
        }

        if(score > nivel * 10 && nivel < 5){
            nivel++;

            if(nivel === 2) dificultad = 60;
            if(nivel === 3) dificultad = 45;
            if(nivel === 4) dificultad = 30;
            if(nivel === 5) dificultad = 15;
        }

        for(let b of bullets){
            b.x += b.speed;
        }

        for(let b of bullets){
            for(let m of meteors){
                if(!m.alive) continue;

                if(
                    b.x > m.x - m.size &&
                    b.x < m.x + m.size &&
                    b.y > m.y - m.size &&
                    b.y < m.y + m.size
                ){
                    m.alive = false;
                    createExplosion(m.x, m.y);
                    score += 2;
                }
            }
        }
    }

    if(invencible){
        tiempoInvencible--;
        if(tiempoInvencible <= 0){
            invencible = false;
        }
    }

    for(let p of particles){
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
    }

    particles = particles.filter(p => p.life > 0);
}

// ⭐ ESTRELLAS RESPONSIVE
function drawStars(){
    for(let i=0;i<40;i++){
        ctx.fillStyle = "white";
        ctx.fillRect(
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            2,2
        );
    }
}

// 🚀 NAVE
function drawPlayer(){

    if(invencible && Math.floor(frame/5) % 2 === 0){
        return;
    }

    ctx.fillStyle = "#00e5ff";
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

// 🔫 BALAS
function drawBullets(){
    for(let b of bullets){
        ctx.fillStyle = "red";
        ctx.fillRect(b.x, b.y, 10, 3);
    }
}

// ☄️ METEORITOS
function drawMeteor(m){
    if(!m.alive) return;

    ctx.fillStyle = "gray";
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.size, 0, Math.PI*2);
    ctx.fill();
}

// DRAW
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStars();

    if(!gameOver){
        drawPlayer();
    }

    for(let m of meteors){
        drawMeteor(m);
    }

    drawBullets();

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";

    let corazones = "";
    for(let i=0;i<vidas;i++){
        corazones += "❤️ ";
    }

    ctx.fillText("Score: " + score + " | Vidas: " + corazones, 10, 25);
    ctx.fillText("Nivel: " + nivel, 10, 50);

    if(gameOver){
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2 - 100, canvas.height/2);
    }
}

// LOOP
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
