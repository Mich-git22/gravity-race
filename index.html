<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/assests/img/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nave vs Meteoritos NIVELES</title>

<style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    margin:0;
    overflow:hidden;
    touch-action:none;
}

#menu{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    background:cyan;
    cursor:pointer;
    border-radius:10px;
}

canvas{
    border:3px solid white;
    background:black;
    display:none;
    width:100vw;
    height:100vh;
}
</style>

</head>
<body>

<div id="menu">
    <h1>🚀 Nave vs Meteoritos ☄️</h1>
    <p>ESPACIO = subir | F = disparar | R = reiniciar</p>
    <button onclick="iniciarJuego()">▶️ Iniciar Juego</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
function iniciarJuego(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameCanvas").style.display = "block";
}

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// 🚫 BLOQUEO ZOOM
document.addEventListener("touchmove", e => e.preventDefault(), { passive:false });

let lastTouch = 0;
document.addEventListener("touchend", function(e){
    let now = Date.now();
    if(now - lastTouch <= 300){
        e.preventDefault();
    }
    lastTouch = now;
}, { passive:false });

/* =========================
   🌌 ESTRELLAS DE FONDO
========================= */

let stars = [];

function initStars(){
    stars = [];
    for(let i = 0; i < 120; i++){
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.8,
            alpha: Math.random(),
            speed: 0.01 + Math.random() * 0.02
        });
    }
}

function drawStars(){
    for(let s of stars){

        s.alpha += s.speed;

        if(s.alpha >= 1 || s.alpha <= 0){
            s.speed *= -1;
        }

        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    }
}

/* =========================
   🚀 NAVE
========================= */

const player = {
    x: 100,
    y: 200,
    width: 60,
    height: 40,
    velY: 0,
    gravity: 0.5,
    thrust: -10
};

/* =========================
   VARIABLES
========================= */

let vidas = 3;
let nivel = 1;
let dificultad = 80;

let meteors = [];
let bullets = [];
let particles = [];

let frame = 0;
let score = 0;
let gameOver = false;

let invencible = false;
let tiempoInvencible = 0;

/* =========================
   CONTROLES
========================= */

document.addEventListener("keydown", function(e){
    if(e.code === "Space"){
        player.velY = player.thrust;
    }

    if(e.key.toLowerCase() === "f"){
        disparar();
    }

    if(e.key.toLowerCase() === "r"){
        resetGame();
    }
});

canvas.addEventListener("touchstart", function(e){
    e.preventDefault();
    player.velY = player.thrust;
}, { passive:false });

canvas.addEventListener("touchend", function(e){
    e.preventDefault();
    disparar();
}, { passive:false });

/* =========================
   DISPARO
========================= */

function disparar(){
    bullets.push({
        x: player.x + 60,
        y: player.y + player.height/2,
        speed: 8
    });
}

/* =========================
   RESET
========================= */

function resetGame(){
    meteors = [];
    bullets = [];
    particles = [];
    score = 0;
    vidas = 3;
    nivel = 1;
    dificultad = 80;
    gameOver = false;
    player.y = 200;
    invencible = false;
}

/* =========================
   METEORITOS
========================= */

function createMeteor(){
    let points = [];
    let sides = 6 + Math.floor(Math.random()*6);

    for(let i=0;i<sides;i++){
        points.push({
            angle: (Math.PI * 2 / sides) * i,
            radius: 15 + Math.random()*(10 + nivel*2)
        });
    }

    meteors.push({
        x: canvas.width,
        y: Math.random() * canvas.height,
        points: points,
        rotation: 0,
        rotationSpeed: (Math.random()*0.06) - 0.03,
        speed: 2 + Math.random()*(nivel * 1.5),
        size: 25 + Math.random()*15,
        alive:true
    });
}

/* =========================
   EXPLOSION
========================= */

function createExplosion(x,y){
    for(let i=0;i<20;i++){
        particles.push({
            x:x,
            y:y,
            vx:(Math.random()-0.5)*5,
            vy:(Math.random()-0.5)*5,
            life:30
        });
    }
}

/* =========================
   UPDATE
========================= */

function update(){
    frame++;

    if(!gameOver){

        player.velY += player.gravity;
        player.y += player.velY;

        if(player.y < 0) player.y = 0;
        if(player.y > canvas.height - player.height){
            player.y = canvas.height - player.height;
        }

        if(frame % dificultad === 0){
            createMeteor();
        }

        if(nivel >= 3 && frame % (dificultad - 10) === 0){
            createMeteor();
        }

        if(nivel >= 5 && frame % (dificultad - 20) === 0){
            createMeteor();
        }

        for(let m of meteors){
            if(!m.alive) continue;

            m.x -= m.speed + (nivel * 0.5);
            m.rotation += m.rotationSpeed;

            if(
                player.x < m.x + m.size &&
                player.x + player.width > m.x - m.size &&
                player.y < m.y + m.size &&
                player.y + player.height > m.y - m.size
            ){
                if(!invencible){
                    m.alive = false;
                    createExplosion(player.x, player.y);
                    vidas--;

                    invencible = true;
                    tiempoInvencible = 60;

                    if(vidas <= 0){
                        gameOver = true;
                    }
                }
            }

            if(m.x < player.x && m.alive){
                score++;
                m.alive = false;
            }
        }

        if(score > nivel * 8 && nivel < 10){
            nivel++;
            dificultad = Math.max(10, dificultad - 10);
        }

        for(let b of bullets){
            b.x += b.speed;
        }

        for(let b of bullets){
            for(let m of meteors){
                if(!m.alive) continue;

                if(
                    b.x > m.x - m.size &&
                    b.x < m.x + m.size &&
                    b.y > m.y - m.size &&
                    b.y < m.y + m.size
                ){
                    m.alive = false;
                    createExplosion(m.x, m.y);
                    score += 2;
                }
            }
        }
    }

    if(invencible){
        tiempoInvencible--;
        if(tiempoInvencible <= 0){
            invencible = false;
        }
    }

    particles = particles.filter(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        return p.life > 0;
    });
}

/* =========================
   METEOROS DIBUJO
========================= */

function drawMeteor(m){
    if(!m.alive) return;

    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rotation);

    ctx.beginPath();
    ctx.moveTo(
        Math.cos(m.points[0].angle) * m.points[0].radius,
        Math.sin(m.points[0].angle) * m.points[0].radius
    );

    for(let p of m.points){
        ctx.lineTo(
            Math.cos(p.angle) * p.radius,
            Math.sin(p.angle) * p.radius
        );
    }

    ctx.closePath();

    let gradient = ctx.createRadialGradient(0,0,5,0,0,40);
    gradient.addColorStop(0, "#6d4c41");
    gradient.addColorStop(1, "#1c1c1c");

    ctx.fillStyle = gradient;
    ctx.fill();

    ctx.restore();
}

/* =========================
   NAVE ORIGINAL
========================= */

function drawPlayer(){

    if(invencible && Math.floor(frame/5)%2===0) return;

    let angle = player.velY * 0.05;

    ctx.save();
    ctx.translate(player.x + player.width/2, player.y + player.height/2);
    ctx.rotate(angle);

    /* 🌌 AURA */
    let glow = ctx.createRadialGradient(0,0,5,0,0,70);
    glow.addColorStop(0,"rgba(0,229,255,0.6)");
    glow.addColorStop(1,"rgba(0,0,0,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0,0,40,0,Math.PI*2);
    ctx.fill();

    /* 🚀 CUERPO */
    let grad = ctx.createLinearGradient(-30,0,30,0);
    grad.addColorStop(0,"#00e5ff");
    grad.addColorStop(1,"#006064");

    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.moveTo(-30,0);
    ctx.lineTo(0,-20);
    ctx.lineTo(30,0);
    ctx.lineTo(0,20);
    ctx.closePath();
    ctx.fill();

    /* 💎 BORDE NEÓN */
    ctx.strokeStyle = "#00ffff";
    ctx.lineWidth = 2;
    ctx.stroke();

    /* 💙 CABINA */
    ctx.fillStyle = "#b3e5fc";
    ctx.beginPath();
    ctx.arc(5, 0, 8, 0, Math.PI*2);
    ctx.fill();

    /* ⚙️ MOTOR */
    ctx.fillStyle = "#00acc1";
    ctx.fillRect(-10,-3,20,6);

    /* 🔥 FUEGO */
    if(player.velY < 0){

        let fire = ctx.createLinearGradient(30,0,60,0);
        fire.addColorStop(0,"orange");
        fire.addColorStop(1,"red");

        ctx.fillStyle = fire;
        ctx.beginPath();
        ctx.moveTo(30,0);
        ctx.lineTo(55,-8);
        ctx.lineTo(55,8);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.moveTo(30,0);
        ctx.lineTo(45,-4);
        ctx.lineTo(45,4);
        ctx.closePath();
        ctx.fill();
    }

    /* ✨ EFECTO */
    if(Math.random() > 0.85){
        ctx.fillStyle = "rgba(0,255,255,0.4)";
        ctx.fillRect(-20,-20,40,40);
    }

    ctx.restore();
}

/* =========================
   DRAW
========================= */

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStars();   // 🌌 fondo

    drawPlayer();

    for(let m of meteors) drawMeteor(m);

    ctx.fillStyle="red";
    for(let b of bullets){
        ctx.fillRect(b.x,b.y,10,3);
    }

    ctx.fillStyle="white";
    ctx.font="18px Arial";

    let corazones="";
    for(let i=0;i<vidas;i++) corazones+="❤️ ";

    ctx.fillText("Score: "+score+" | Vidas: "+corazones,10,25);
    ctx.fillText("Nivel: "+nivel,10,50);

    if(gameOver){
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-120,canvas.height/2);
    }
}

/* =========================
   LOOP
========================= */

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

initStars();
loop();
</script>

</body>
</html>
